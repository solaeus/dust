[package]
name = "dust-lang"
description = "Data-Oriented Programming Language"
version = "0.3.9"
repository = "https://git.jeffa.io/jeff/dust.git"
edition = "2021"
license = "MIT"

[[bin]]
name = "dust"
path = "src/main.rs"

[profile.dev]
opt-level = 1
[profile.dev.package."*"]
opt-level = 3

[dependencies]
ansi_term = "0.12.1"
clap = { version = "4.4.4", features = ["derive"] }
crossterm = "0.27.0"
csv = "1.3.0"
rand = "0.8.5"
ratatui = "0.25.0"
rayon = "1.8.0"
reqwest = { version = "0.11.20", features = ["blocking", "json"] }
serde = { version = "1.0.188", features = ["derive"] }
serde_json = "1.0.107"
toml = "0.8.8"
tree-sitter = "0.20.10"
tui-textarea = "0.4.0"

[build-dependencies]
cc = "1.0"
